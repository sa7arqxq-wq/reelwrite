<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1408"/>
      <stop offset="100%" stop-color="#3d2810"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pen nib (downward triangle with split) -->
  <path d="M 256 120 L 360 360 L 280 360 L 280 280 L 232 280 L 232 360 L 152 360 Z" fill="url(#accent)"/>
  <!-- 7-second timer dot -->
  <circle cx="256" cy="200" r="14" fill="#0a0a0a"/>
  <!-- Play triangle overlay (subtle) -->
  <path d="M 232 410 L 280 410 L 256 440 Z" fill="url(#accent)" opacity="0.7"/>
</svg>
